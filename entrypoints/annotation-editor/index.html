<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스크린샷 주석</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="overlay">
      <div id="canvas-wrap">
        <canvas id="annotation-canvas"></canvas>
      </div>
      <div id="toolbar">
        <button type="button" data-tool="arrow" class="tool active" title="화살표 (A)">화살표</button>
        <button type="button" data-tool="rectangle" class="tool" title="사각형 (R)">사각형</button>
        <button type="button" data-tool="text" class="tool" title="텍스트 (T)">텍스트</button>
        <button type="button" data-tool="blur" class="tool" title="모자이크 (B)">모자이크</button>
        <span class="sep"></span>
        <button type="button" id="undo-btn" title="실행 취소 (Ctrl+Z)">실행 취소</button>
        <button type="button" id="save-btn" class="primary">저장</button>
        <button type="button" id="cancel-btn">취소</button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
